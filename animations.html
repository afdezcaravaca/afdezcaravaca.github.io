    <script>
        AFRAME.registerComponent('snap-to-mesh', {
          schema: {
            target: { type: 'selector' },
            offset: { type: 'number', default: 1.5 },
            rayHeight: { type: 'number', default: 10 }
          },
          
          init: function () {
            this.raycaster = new THREE.Raycaster();
            this.downVector = new THREE.Vector3(0, -1, 0);
            
            // Variables auxiliares pre-alojadas en memoria por rendimiento (Best Practice en bucles tick)
            this.worldPos = new THREE.Vector3();
            this.localTargetPos = new THREE.Vector3();
          },

          tick: function () {
            if (!this.data.target) return;
            
            const mesh = this.data.target.getObject3D('mesh');
            if (!mesh) return; 

            const el3D = this.el.object3D;
            
            // 1. Obtener la posición exacta en el mundo real (saltando las escalas de los padres)
            el3D.getWorldPosition(this.worldPos);
            
            // 2. Disparar el rayo desde esa altura global
            const rayOrigin = new THREE.Vector3(this.worldPos.x, this.worldPos.y + this.data.rayHeight, this.worldPos.z);
            this.raycaster.set(rayOrigin, this.downVector);

            const intersects = this.raycaster.intersectObject(mesh, true);

            if (intersects.length > 0) {
              // 3. Obtener el punto de impacto global
              const worldGroundPoint = intersects[0].point;
              
              // 4. Transformar el punto global al sistema de coordenadas local del padre (el circuito escalado)
              this.localTargetPos.copy(worldGroundPoint);
              if (el3D.parent) {
                el3D.parent.worldToLocal(this.localTargetPos);
              }
              
              // 5. Aplicar la nueva altura usando el valor local corregido
              el3D.position.y += (this.localTargetPos.y + this.data.offset - el3D.position.y) * 0.2; 
            }
          }
        });
        
        AFRAME.registerComponent('lock-pitch', {
          dependencies: ['look-controls'],
          schema: {
            margin: { type: 'number', default: 15 } // Margen de movimiento en grados (arriba y abajo)
          },
          
          init: function () {
            const lookControls = this.el.components['look-controls'];

            // Three.js calcula la rotación en radianes. Convertimos los grados del HTML a radianes.
            this.maxPitch = THREE.MathUtils.degToRad(this.data.margin);
            this.minPitch = -this.maxPitch;

            // 1. Intercepción del Ratón
            const originalMouseMove = lookControls.onMouseMove.bind(lookControls);
            lookControls.onMouseMove = (evt) => {
              originalMouseMove(evt);
              // Aplicamos el límite: Si el valor supera el máximo, se queda en el máximo.
              lookControls.pitchObject.rotation.x = THREE.MathUtils.clamp(
                lookControls.pitchObject.rotation.x, 
                this.minPitch, 
                this.maxPitch
              );
            };

            // 2. Intercepción Táctil
            const originalTouchMove = lookControls.onTouchMove.bind(lookControls);
            lookControls.onTouchMove = (evt) => {
              originalTouchMove(evt);
              lookControls.pitchObject.rotation.x = THREE.MathUtils.clamp(
                lookControls.pitchObject.rotation.x, 
                this.minPitch, 
                this.maxPitch
              );
            };
          },

          tick: function () {
            // 3. Fallback continuo para garantizar que el límite no se rompa por físicas o VR
            const lookControls = this.el.components['look-controls'];
            lookControls.pitchObject.rotation.x = THREE.MathUtils.clamp(
              lookControls.pitchObject.rotation.x, 
              this.minPitch, 
              this.maxPitch
            );
          }
        });

  tick: function (time, delta) {
    if (this.finished || this.waypoints.length < 2) return;

    const pos    = this.el.object3D.position;
    const target = this.waypoints[this.currentIndex];
    const dx     = target.x - pos.x;
    const dz     = target.z - pos.z;
    const dist   = Math.sqrt(dx * dx + dz * dz);

    if (dist < this.data.threshold) {
      this.currentIndex++;
      if (this.currentIndex >= this.waypoints.length) {
        this.currentIndex = 0;
        this.laps++;
        this.el.emit('lap-complete', { laps: this.laps });

        if (this.laps >= this.data.lapsToWin) {
          this.finished = true;
          this.el.emit('race-finished', { winner: 'ai' });
        }
      }
      return;
    }

    const step = this.data.speed * delta / 1000;
    pos.x += (dx / dist) * step;
    pos.z += (dz / dist) * step;

    // Orientar en Y hacia el siguiente waypoint (XZ)
    this.el.object3D.rotation.y = Math.atan2(dx, dz);
  }
});


  AFRAME.registerComponent('race-manager', {
    schema: {
      playerCar: { type: 'selector' },  // entidad gltf del coche del jugador
      aiCar:{ type: 'selector' },  // entidad gltf del coche AI
      aiRig: { type: 'selector' },  // el rig con waypoint-follower
      finishPos: { type: 'vec3',   default: { x: 8.5, y: 53.5, z: 0 } },
      finishRadius:{ type: 'number', default: 3 },
      lapsToWin: { type: 'number', default: 1 }
    },

    init: function () {
        this.raceOver = false;
        this.playerLaps = 0;
        this.playerNearLine = true;
        this._playerWorld = new THREE.Vector3();
        this._finishVec = new THREE.Vector3();
        this._metaEl = null;

        const assignMeta = () => {
          this._metaEl = document.querySelector('#meta');
          console.log('meta asignado:', this._metaEl);
        };

        if (this.el.sceneEl.hasLoaded) {
          assignMeta(); // escena ya cargada
        } else {
          this.el.sceneEl.addEventListener('loaded', assignMeta);
        }

        if (this.data.aiRig) {
          this.data.aiRig.addEventListener('race-finished', () => {
            if (!this.raceOver) this.endRace('ai');
          });
        }
      },

      tick: function () {
        if (this.raceOver || !this.data.playerCar || !this._metaEl) return;

        this.data.playerCar.object3D.getWorldPosition(this._playerWorld);
        this._metaEl.object3D.getWorldPosition(this._finishVec);

        const dist = this._playerWorld.distanceTo(this._finishVec);
        console.log('dist:', dist.toFixed(2));

        if (dist < this.data.finishRadius) {
          if (!this.playerNearLine) {
            this.playerNearLine = true;
            this.playerLaps++;
            if (this.playerLaps >= this.data.lapsToWin) {
              this.endRace('player');
            }
          }
        } else {
          this.playerNearLine = false;
        }
      },
    endRace: function (winner) {
      this.raceOver = true;

      if (this.data.aiRig && this.data.aiRig.components['waypoint-follower']) {
        this.data.aiRig.components['waypoint-follower'].finished = true;
      }

      const winnerMesh = winner === 'player' ? this.data.playerCar : this.data.aiCar;
      const loserMesh  = winner === 'player' ? this.data.aiCar     : this.data.playerCar;

      this.applyWinEffect(winnerMesh);
      this.applyLoseEffect(loserMesh);

      // ← nuevo
      const el = document.getElementById('race-result');
      if (el) {
        el.textContent = winner === 'player' ? '🏆 ¡Has ganado!' : '💀 Has perdido';
        el.style.display = 'block';
      }

      console.log('Ganador:', winner);
    },

    applyWinEffect: function (el) {
      const mesh = el.getObject3D('mesh');
      if (!mesh) return;
      mesh.traverse(node => {
        if (!node.isMesh) return;
        const mats = Array.isArray(node.material) ? node.material : [node.material];
        mats.forEach(mat => {
          mat.emissive          = new THREE.Color(1, 0.85, 0.1);
          mat.emissiveIntensity = 1.2;
          mat.needsUpdate       = true;
        });
      });
    },

    applyLoseEffect: function (el) {
      const mesh = el.getObject3D('mesh');
      if (!mesh) return;
      mesh.traverse(node => {
        if (!node.isMesh) return;
        const mats = Array.isArray(node.material) ? node.material : [node.material];
        mats.forEach(mat => {
          if (mat.color) {
            const lum = mat.color.r * 0.299 + mat.color.g * 0.587 + mat.color.b * 0.114;
            mat.color.setRGB(lum * 0.4, lum * 0.4, lum * 0.4);
          }
          mat.emissiveIntensity = 0;
          mat.needsUpdate       = true;
        });
      });
    }
  });
    </script>

        <img id="rueda" src="./Assets/llanta.jpeg">
        <a-asset-item id="sun" src="./Assets/sun/scene.gltf"></a-asset-item>
        <a-asset-item id="mercury" src="./Assets/mercurio/scene.gltf"></a-asset-item>
        <a-asset-item id="venus" src="./Assets/venus/scene.gltf"></a-asset-item>
        <a-asset-item id="earth" src="./Assets/tierra/scene.gltf"></a-asset-item>
        <a-asset-item id="moon" src="./Assets/moon/scene.gltf"></a-asset-item>
        <a-asset-item id="rainbow_road" src="./Assets/rainbow_road_64/scene.glb"></a-asset-item>
        <a-asset-item id="marte" src="./Assets/marte/scene.gltf"></a-asset-item>
        <a-asset-item id="jupyter" src="./Assets/jupiter/scene.gltf"></a-asset-item>
        <a-asset-item id="saturno" src="./Assets/realistic_saturn_8k/scene.gltf"></a-asset-item>
        <a-asset-item id="neptuno" src="./Assets/neptuno/scene.gltf"></a-asset-item>
        <a-asset-item id="coche" src="./Assets/go_kart/scene.gltf"></a-asset-item>
        
      </a-assets>

      
      <a-sky src="#sky" radius="3000"></a-sky>
      <a-entity gltf-model="#earth" position="0 0 0" scale="2 2 2" animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:10000; easing:linear">
      
      <a-entity id="circuito-fisico" gltf-model="#rainbow_road" scale="0.2 0.2 0.2" position="0 0 0" animation="property:rotation; from:0 0 0; to:0 -360 0; loop:true; dur:10000; easing:linear">
        <a-entity id="meta" position="8.5 53.5 4"></a-entity>
        <a-entity id="camera-rig" position="8.5 53.5 0" rotation="0 180 0">
          
          <a-camera id="player-camera" wasd-controls="acceleration:70;" 
                    look-controls="pointerLockEnabled: true"
                    lock-pitch="margin:45"
                    position="0 0 0"
                    snap-to-mesh="target: #circuito-fisico; offset: 0.7; rayHeight: 2">
            
            <a-entity gltf-model="#coche" scale="0.005 0.005 0.005" position="0 -0.5 -0" rotation="0 180 0"></a-entity>
            
            <a-cylinder src="#rueda" 
                height="0.25" 
                radius="0.11" 
                position="-0.32 -0.45 -0.57" 
                rotation="0 0 90" 
                animation="property: rotation; from: 0 0 90; to: -360 0 90; loop: true; dur: 800; easing: linear">
            </a-cylinder>
            
            <a-cylinder src="#rueda" 
                height="0.25" 
                radius="0.11" 
                position="0.37 -0.45 -0.57" 
                rotation="0 0 90" 
                animation="property: rotation; from: 0 0 90; to: -360 0 90; loop: true; dur: 800; easing: linear">
            </a-cylinder>
            
          </a-camera>
          
        </a-entity>

        <!-- Coche AI autónomo -->
        <a-entity id="ai-rig"
                  position="10.5 51.5 -20"
                  rotation="0 180 0"
                  waypoint-follower="speed: 13.1w; threshold: 2; lapsToWin: 1"
                  snap-to-mesh="target: #circuito-fisico; offset: 0.8; rayHeight: 2">

          <a-entity id="ai-coche"
                    gltf-model="#coche"
                    scale="0.005 0.005 0.005"
                    position="0 -0.5 0"
                    rotation="0 0 0">
          </a-entity>

        </a-entity>
        
      </a-entity>
    </a-entity>

      <a-entity rotation="5 0 0">
        <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:50000; easing:linear">
          <a-entity gltf-model="#moon" position="40 0 0" scale="0.8 0.8 0.8" animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:10000; easing:linear"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity rotation="-3 0 0">
        <a-entity animation="property:rotation; from:0 80 0; to:0 440 0; loop:true; dur:110000; easing:linear">
          <a-entity gltf-model="#mercury" position="100 0 0" scale="2 2 2" animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:10000; easing:linear"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity rotation="2 0 0">
        <a-entity animation="property:rotation; from:0 200 0; to:0 560 0; loop:true; dur:17000; easing:linear">
          <a-entity gltf-model="#venus" position="170 0 0" scale="7 6.5 7" animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:10000; easing:linear"></a-entity>
        </a-entity>
      </a-entity>


      <a-entity rotation="0 0 0">
        <a-entity animation="property:rotation; from:0 310 0; to:0 670 0; loop:true; dur:25000; easing:linear">
          <a-entity gltf-model="#sun" position="270 0 0" scale="5 5 5"
            animation__spin="property:rotation; to:0 360 0; loop:true; dur:10000; easing:linear">
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity rotation="1.8 0 0">
        <a-entity animation="property:rotation; from:0 45 0; to:0 405 0; loop:true; dur:47000; easing:linear">
          <a-entity gltf-model="#marte" position="400 0 0" scale="3 3 3" animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:10000; easing:linear"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity rotation="-1.3 0 0">
        <a-entity animation="property:rotation; from:0 260 0; to:0 620 0; loop:true; dur:120000; easing:linear">
          <a-entity gltf-model="#jupyter" position="620 0 0" scale="100 100 100" animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:10000; easing:linear"></a-entity>
        </a-entity>
      </a-entity>

      
      <a-entity rotation="0 0 0">
        <a-entity animation="property:rotation; from:0 130 0; to:0 490 0; loop:true; dur:280000; easing:linear">
          <a-entity gltf-model="#saturno" position="720 0 0" scale="6 6 6" animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:10000; easing:linear"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity rotation="-1.8 0 0">
        <a-entity animation="property:rotation; from:0 330 0; to:0 690 0; loop:true; dur:900000; easing:linear">
          <a-entity gltf-model="#neptuno" position="1100 0 0" scale="5 5 5" animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:10000; easing:linear"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity race-manager="
      playerCar: #player-camera;
      aiCar: #ai-coche;
      aiRig: #ai-rig;
      finishRadius: 4;
      lapsToWin: 1">
    </a-entity>

    </a-scene>
  </body>
</html>
